<!DOCTYPE html>
<html>
<head>
    <title>Sensor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        h2 { text-align: center; }
        .max-values { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .max-card {
            background-color: #f0f0f0;
            border-radius: 10px;
            padding: 15px 25px;
            text-align: center;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.1);
            min-width: 180px;
        }
        canvas { max-width: 800px; margin: auto; display: block; margin-bottom: 30px; }
    </style>
</head>
<body>

<h2>Live Sensor Dashboard</h2>

<div class="max-values">
    <div class="max-card" id="maxAcc">Max Acceleration: N/A</div>
    <div class="max-card" id="maxHR">Current Heart Rate: N/A</div>
    <div class="max-card" id="maxAlcohol">Max Alcohol: N/A</div>
</div>

<!-- Current value cards -->
<div class="max-values">
    <div class="max-card" id="currentAcc">Current Acceleration: N/A</div>
    <div class="max-card" id="currentAlcohol">Current Alcohol: N/A</div>
</div>

<canvas id="accChart"></canvas>
<canvas id="hrChart"></canvas>
<canvas id="alcoholChart"></canvas>

<script>
const socket = io();
const maxPoints = 50;

// Create charts
function createChart(ctx, label, color) {
    return new Chart(ctx, {
        type: 'line',
        data: { labels: [], datasets: [{ label: label, data: [], borderColor: color, fill: false, tension: 0.1 }] },
        options: {
            animation: false,
            responsive: true,
            plugins: { legend: { display: true } },
            scales: { x: { display: true, title: { display: true, text: 'Time' } }, y: { beginAtZero: true } }
        }
    });
}

const accChart = createChart(document.getElementById("accChart"), "Acceleration", "blue");
const hrChart = createChart(document.getElementById("hrChart"), "Heart Rate", "red");
const alcoholChart = createChart(document.getElementById("alcoholChart"), "Alcohol Level", "green");

// Track max values
let maxAcc = { value: 0, paired: null };
let maxHR = { value: 0, paired: null };
let maxAlcohol = { value: 0, paired: null };

let currentAcc = 0;
let currentAlc = 0;

function updateChart(chart, value, time) {
    chart.data.labels.push(time);
    chart.data.datasets[0].data.push(value);

    if (chart.data.labels.length > maxPoints) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }

    chart.update();
}

// Update max cards
function updateMaxCards() {
    document.getElementById("maxAcc").innerHTML = `Max Acceleration: ${maxAcc.value}g (Alcohol: ${maxAcc.paired})`;
    document.getElementById("maxHR").innerHTML = `Current Heart Rate: ${maxHR.value}`;
    document.getElementById("maxAlcohol").innerHTML = `Max Alcohol: ${maxAlcohol.value} (Acceleration: ${maxAlcohol.paired})`;

    document.getElementById("currentAcc").innerHTML = `Current Acceleration: ${currentAcc}`;
    document.getElementById("currentAlcohol").innerHTML = `Current Alcohol: ${currentAlc}`;
}

socket.on("new_data", function(data) {
    const time = data.time;

    // Update charts
    updateChart(accChart, data.acceleration, time);
    updateChart(hrChart, data.hr, time);
    updateChart(alcoholChart, data.alcohol, time);

    // Update max values
    if (data.acceleration > maxAcc.value) {
        maxAcc.value = data.acceleration;
        maxAcc.paired = data.alcohol;  // paired alcohol at max acc
    }
    maxHR.value = data.hr;
    if (data.alcohol > maxAlcohol.value) {
        maxAlcohol.value = data.alcohol;
        maxAlcohol.paired = data.acceleration; // paired acceleration at max alcohol
    }

    currentAcc = data.acceleration;
    currentAlc = data.alcohol;
    updateMaxCards();
});
</script>

</body>
</html>
